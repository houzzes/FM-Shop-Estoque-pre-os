name: Coleta diária de preços/estoque

on:
  schedule:
    - cron: "30 10 * * *" # 07:30 America/Sao_Paulo
  workflow_dispatch:
    inputs:
      julia_mode:
        description: "Sincronizar doc na Julia (teste manual)"
        type: choice
        default: "off"
        options: ["off", "dry-run", "full"]

permissions:
  contents: write

env:
  # Sync automático da Julia nas rodadas AGENDADAS. Validado em
  # 21/07/2026 (runs #6 dry-run e #7 full — ver saida/julia-sync-log.md).
  JULIA_SYNC_AGENDADO: "true"

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Coletar loja
        id: coleta
        run: |
          set +e
          node src/collect.js
          code=$?
          set -e
          if [ "$code" = "10" ]; then
            echo "mudou=true" >> "$GITHUB_OUTPUT"
          elif [ "$code" = "0" ]; then
            echo "mudou=false" >> "$GITHUB_OUTPUT"
          else
            exit "$code"
          fi

      - name: Commit do estado e do doc
        if: steps.coleta.outputs.mudou == 'true'
        run: |
          git config user.name "houzzes-bot"
          git config user.email "houzzes.adm@gmail.com"
          git add data saida
          git commit -m "Coleta $(date -u +%F): mudanças detectadas"
          git push

      - name: Sincronizar doc na Julia
        # Roda: (a) manualmente com julia_mode != off; ou (b) na rodada
        # agendada com mudança, quando JULIA_SYNC_AGENDADO=true.
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.julia_mode != 'off') ||
          (github.event_name == 'schedule' && steps.coleta.outputs.mudou == 'true' && env.JULIA_SYNC_AGENDADO == 'true')
        env:
          GPTMAKER_API_KEY: ${{ secrets.GPTMAKER_API_KEY }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.julia_mode || 'full' }}
        run: |
          DOC_SHA=$(git rev-parse HEAD)
          export DOC_URL="https://raw.githubusercontent.com/${{ github.repository }}/${DOC_SHA}/saida/produtos_fmd_atualizados.txt"
          node src/update-julia.js

      - name: Commit do log de sync da Julia
        if: always()
        run: |
          if ! git diff --quiet saida/julia-sync-log.md 2>/dev/null || [ -n "$(git status --porcelain saida/julia-sync-log.md)" ]; then
            git config user.name "houzzes-bot"
            git config user.email "houzzes.adm@gmail.com"
            git add saida/julia-sync-log.md
            git commit -m "Julia sync: log de $(date -u +%F)"
            git push
          fi

      - name: Avisar no Houzbot
        if: steps.coleta.outputs.mudou == 'true'
        env:
          HOUZBOT_API_URL: ${{ secrets.HOUZBOT_API_URL }}
          HOUZBOT_TOKEN: ${{ secrets.HOUZBOT_TOKEN }}
          HOUZBOT_DESTINO: ${{ secrets.HOUZBOT_DESTINO }}
        run: node src/notify.js
